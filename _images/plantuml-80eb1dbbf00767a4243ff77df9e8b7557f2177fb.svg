ext><path d="M310,526.0938 L310,581.0938 L557,581.0938 L557,536.0938 L547,526.0938 L310,526.0938 " fill="#FBFB77" filter="url(#fq4jvn2nhww2r)" style="stroke: #A80036; stroke-width: 1.0;"/><path d="M547,526.0938 L547,536.0938 L557,536.0938 L547,526.0938 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="226" x="316" y="543.1606">Session tokens expire after 60 min.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="191" x="316" y="558.2935">Failed attempts are logged as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="140" x="316" y="573.4263">AuditEvent resources.</text><!--MD5=[4f0bed77303b7b451b848bf34a3f3b55]
@startuml
actor "User" as User
participant "Client App" as Client
participant "AI Service\n(/api/auth)" as Auth
database "SSO DB" as SSODB
database "OpenEMR DB" as OEDB

User -> Client : Enter credentials
Client -> Auth : POST /api/auth/login\n{username, password}
Auth -> SSODB : SELECT user\nWHERE username = ?
SSODB - -> Auth : user record

alt Password matches (bcrypt verify)
  Auth -> Auth : Generate session token
  Auth -> OEDB : Sync user record\n(if changed)
  OEDB - -> Auth : OK
  Auth - -> Client : 200 {token, user, role}
  Client - -> User : Login success
else Password mismatch
  Auth - -> Client : 401 Unauthorized
  Client - -> User : Invalid credentials
end

note over Auth, SSODB
  Session tokens expire after 60 min.
  Failed attempts are logged as
  AuditEvent resources.
end note
@enduml

